# One-time workflow to run ml/data/simulate_interactions.py remotely.

# running the simulation locally consistently failed with
# "[Errno 54] Connection reset by peer" during the TLS handshake to Supabase,
#

name: Simulate Interactions

on:
  workflow_dispatch:

jobs:
  simulate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run simulation
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python -m ml.data.simulate_interactions
