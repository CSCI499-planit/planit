services:
  - type: web
    name: planit-backend
    runtime: python
    buildCommand: pip install -e .
    startCommand: uvicorn server.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: PRODUCTION_URL
        sync: false
      - key: ML_SERVICE_URL
        sync: false

  - type: web
    name: planit-ml
    runtime: python
    buildCommand: pip install -e .
    startCommand: uvicorn ml.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: GEOAPIFY_KEY
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: ARTIFACT_BUCKET
        value: ml-artifacts
