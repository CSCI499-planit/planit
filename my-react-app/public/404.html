<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>PlanIt</title>
    <script>
      var pathSegmentsToKeep = 1;
      var locationRef = window.location;
      var path = locationRef.pathname
        .split("/")
        .slice(1 + pathSegmentsToKeep)
        .join("/")
        .replace(/&/g, "~and~");
      var base = locationRef.pathname
        .split("/")
        .slice(0, 1 + pathSegmentsToKeep)
        .join("/");

      locationRef.replace(
        locationRef.protocol +
          "//" +
          locationRef.hostname +
          (locationRef.port ? ":" + locationRef.port : "") +
          base +
          "/?/" +
          path +
          (locationRef.search ? "&" + locationRef.search.slice(1).replace(/&/g, "~and~") : "") +
          locationRef.hash,
      );
    </script>
  </head>
  <body></body>
</html>
