<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PlanIt</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function restoreGitHubPagesRoute(location) {
        if (location.search[1] !== "/") return;

        var route = location.search
          .slice(1)
          .split("&")
          .map(function (part) {
            return part.replace(/~and~/g, "&");
          })
          .join("?");

        window.history.replaceState(
          null,
          "",
          location.pathname.slice(0, -1) + route + location.hash,
        );
      })(window.location);
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
